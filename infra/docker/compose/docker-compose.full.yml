services:

  # ─── Message broker ───────────────────────────────────────────────────────────
  nats:
    image: nats:2.10-alpine
    ports:
      - '4222:4222'
    restart: unless-stopped

  # ─── Databases (one per service) ──────────────────────────────────────────────
  postgres-identity:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: identity
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata-identity:/var/lib/postgresql/data
    restart: unless-stopped

  postgres-learning:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: learning
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata-learning:/var/lib/postgresql/data
    restart: unless-stopped

  postgres-certification:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: certification
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata-certification:/var/lib/postgresql/data
    restart: unless-stopped

  # ─── Microservices ────────────────────────────────────────────────────────────
  identity-service:
    build:
      context: ../../../apps/backend
      dockerfile: ../../infra/docker/images/services/Dockerfile.identity
    environment:
      NATS_URL: nats://nats:4222
      IDENTITY_DATABASE_URL: postgresql://postgres:postgres@postgres-identity:5432/identity
      JWT_SECRET: ${JWT_SECRET:-pccl_secret_change_in_prod}
      JWT_EXPIRES_IN: 1d
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      - nats
      - postgres-identity
    restart: unless-stopped

  learning-service:
    build:
      context: ../../../apps/backend
      dockerfile: ../../infra/docker/images/services/Dockerfile.learning
    environment:
      NATS_URL: nats://nats:4222
      LEARNING_DATABASE_URL: postgresql://postgres:postgres@postgres-learning:5432/learning
      IDENTITY_DATABASE_URL: postgresql://postgres:postgres@postgres-identity:5432/identity
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      - nats
      - postgres-learning
      - identity-service
    restart: unless-stopped

  certification-service:
    build:
      context: ../../../apps/backend
      dockerfile: ../../infra/docker/images/services/Dockerfile.certification
    environment:
      NATS_URL: nats://nats:4222
      CERTIFICATION_DATABASE_URL: postgresql://postgres:postgres@postgres-certification:5432/certification
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      - nats
      - postgres-certification
      - learning-service
    restart: unless-stopped

  gateway:
    build:
      context: ../../../apps/backend
      dockerfile: ../../infra/docker/images/services/Dockerfile.gateway
    ports:
      - '4000:4000'
    environment:
      PORT: 4000
      NATS_URL: nats://nats:4222
      JWT_SECRET: ${JWT_SECRET:-pccl_secret_change_in_prod}
      JWT_EXPIRES_IN: 1d
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3001}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-localhost}
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      - nats
      - identity-service
      - learning-service
      - certification-service
    restart: unless-stopped

volumes:
  pgdata-identity:
  pgdata-learning:
  pgdata-certification:
